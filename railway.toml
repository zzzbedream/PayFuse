# Railway deployment configuration for PayFuse Backend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
# Build from the backend directory
buildCommand = "cd apps/backend && npm ci && npm run build"

[deploy]
# Start the backend server
startCommand = "cd apps/backend && npm run start"
# Health check endpoint
healthcheckPath = "/api/health"
healthcheckTimeout = 100
# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Number of replicas (free tier = 1)
numReplicas = 1
